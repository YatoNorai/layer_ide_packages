name: Publish APT Repository

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'ID do run de build que gerou os pacotes (aba Actions → copie o número do run)'
        required: true
        type: string

env:
  SSH_HOST: 158.101.9.154

jobs:
  publish:
    name: Download → APT repo → Upload
    runs-on: ubuntu-latest
    permissions:
      actions: read   # needed to download artifacts from another run

    steps:
      - name: Checkout repository (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      # ── Download artifacts from the build run ─────────────────────────────
      - name: Download packages-aarch64
        uses: actions/download-artifact@v4
        with:
          name: packages-aarch64
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .

      - name: Download packages-arm
        uses: actions/download-artifact@v4
        with:
          name: packages-arm
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .

      # ── Extract tarballs → output/{arch}/*.deb ────────────────────────────
      - name: Extract packages
        run: |
          mkdir -p output/aarch64 output/arm
          tar -xzf packages-aarch64.tar.gz -C output/aarch64
          tar -xzf packages-arm.tar.gz     -C output/arm
          echo "aarch64 debs: $(find output/aarch64 -maxdepth 1 -name '*.deb' | wc -l)"
          echo "arm     debs: $(find output/arm     -maxdepth 1 -name '*.deb' | wc -l)"

      # ── Install tools ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget gnupg rsync dpkg

      # ── Generate APT repository (same structure as Termux APT) ────────────
      - name: Generate APT repository
        run: |
          sed -i 's/\r//' generate-apt-repo.sh common.sh utils.sh packages.sh
          bash generate-apt-repo.sh

      # ── Sign Release file → InRelease ─────────────────────────────────────
      - name: Sign APT repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5}' | head -1)
          echo "Signing with key: $GPG_KEY_ID"
          echo "$GPG_PASSPHRASE" | \
            gpg --batch \
                --yes \
                --passphrase-fd 0 \
                --pinentry-mode loopback \
                --default-key "$GPG_KEY_ID" \
                --digest-algo SHA256 \
                --clearsign \
                -o output/repo/dists/stable/InRelease \
                output/repo/dists/stable/Release
          echo "Repository signed ✓"
          echo "--- Repository structure ---"
          find output/repo -type f | sort

      # ── Upload to SSH server ───────────────────────────────────────────────
      - name: Upload APT repository to SSH server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          REMOTE="${{ secrets.SSH_USER }}@$SSH_HOST"
          RPATH="${{ secrets.SSH_REMOTE_PATH }}"

          # Create directory and grant write permission to the deploy user.
          # Uses sudo because /var/www/html is typically owned by root/www-data.
          $SSH "$REMOTE" "
            sudo mkdir -p '$RPATH' && \
            sudo chown -R \$USER:\$USER '$RPATH' && \
            sudo chmod -R 755 '$RPATH'
          "

          # Sync all repo files (--delete removes stale files on the server)
          rsync -avz --delete \
            --no-group \
            -e "$SSH" \
            output/repo/ \
            "$REMOTE:$RPATH/"

          echo "APT repository published at https://packagesyatonorai.duckdns.org/apt/termux-main ✓"
